<!doctype html>
<html lang="id" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Prototype - Bold Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              // User requested palette
              "brand-blue": "#0C5EAD",
              "brand-blue-hover": "#0A4C8C",
              "brand-orange": "#F99823",
              "brand-orange-hover": "#DF8216",

              // Enhanced Light Mode
              "app-bg-light": "#F4F6F8", // Slightly cool off-white
              "card-bg-light": "#FFFFFF",
              "border-light": "#E2E8F0",
              "input-bg-light": "#F8FAFC",
              "text-main-light": "#1E293B",
              "text-muted-light": "#64748B",

              // Enhanced Dark Mode
              "app-bg-dark": "#0B1120", // Deep dark blue
              "card-bg-dark": "#1E293B", // Slate 800
              "border-dark": "#334155", // Slate 700
              "input-bg-dark": "#0F172A", // Slate 900
              "text-main-dark": "#F8FAFC",
              "text-muted-dark": "#94A3B8",
            },
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            boxShadow: {
              "glow-blue": "0 0 20px -5px rgba(12, 94, 173, 0.4)",
              "glow-orange": "0 0 20px -5px rgba(249, 152, 35, 0.4)",
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
      }

      /* Hilangkan spinner di input type number untuk OTP */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }

      /* Animasi Transisi Halus */
      .fade-enter {
        animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Subtle hover float untuk ilustrasi */
      .hover-float {
        transition: transform 0.4s ease;
      }
      .hover-float:hover {
        transform: translateY(-8px);
      }

      /* Custom Input Autofill styling to match theme */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px transparent inset !important;
        transition: background-color 5000s ease-in-out 0s;
      }
    </style>
  </head>
  <body
    class="bg-app-bg-light dark:bg-app-bg-dark text-text-main-light dark:text-text-main-dark min-h-screen flex items-center justify-center p-4 lg:p-8 transition-colors duration-300"
  >
    <!-- Theme Switcher (Absolute Top Right) -->
    <div class="fixed top-6 right-6 z-50">
      <button
        onclick="toggleTheme()"
        class="px-4 py-2 rounded-full bg-card-bg-light dark:bg-card-bg-dark border border-border-light dark:border-border-dark shadow-sm hover:shadow-md transition-all flex items-center gap-2 text-sm font-semibold group"
      >
        <span class="dark:hidden group-hover:rotate-12 transition-transform"
          >🌙</span
        >
        <span class="dark:hidden">Dark</span>
        <span
          class="hidden dark:block group-hover:rotate-12 transition-transform"
          >☀️</span
        >
        <span class="hidden dark:block">Light</span>
      </button>
    </div>

    <!-- Main Card Container -->
    <div
      id="main-container"
      class="w-full max-w-4xl transition-all duration-500 ease-in-out relative"
    >
      <!-- Glow Effect Behind Card -->
      <div
        class="absolute -inset-1 bg-gradient-to-r from-brand-blue to-brand-orange rounded-3xl blur opacity-20 dark:opacity-30"
      ></div>

      <div
        class="bg-card-bg-light dark:bg-card-bg-dark border border-border-light dark:border-border-dark rounded-2xl p-8 md:p-12 shadow-xl transition-colors duration-300 relative overflow-hidden z-10"
      >
        <!-- ============================================== -->
        <!-- VIEW 1: SIGN IN (Split Layout - Premium)       -->
        <!-- ============================================== -->
        <div id="view-signin" class="fade-enter block">
          <div class="grid md:grid-cols-2 gap-12 lg:gap-16 items-center">
            <!-- Left: Form Area -->
            <div>
              <div class="mb-8">
                <h1 class="text-3xl md:text-4xl font-bold mb-2 tracking-tight">
                  Welcome Back
                </h1>
                <p
                  class="text-text-muted-light dark:text-text-muted-dark text-sm md:text-base"
                >
                  Please enter your details to sign in.
                </p>
              </div>

              <form
                class="space-y-5"
                onsubmit="
                  event.preventDefault();
                  showView('view-otp');
                "
              >
                <!-- Email Input with Icon -->
                <div class="space-y-2">
                  <label class="block text-sm font-semibold tracking-wide"
                    >Email Address</label
                  >
                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-text-muted-light dark:text-text-muted-dark"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                        />
                      </svg>
                    </div>
                    <input
                      type="email"
                      placeholder="name@company.com"
                      class="w-full bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl pl-11 pr-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-orange/50 focus:border-brand-orange transition-all duration-200"
                      required
                    />
                  </div>
                </div>

                <!-- Password Input with Icons -->
                <div class="space-y-2 relative">
                  <label class="block text-sm font-semibold tracking-wide"
                    >Password</label
                  >
                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-text-muted-light dark:text-text-muted-dark"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                        />
                      </svg>
                    </div>
                    <input
                      type="password"
                      placeholder="••••••••"
                      class="w-full bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl pl-11 pr-11 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-orange/50 focus:border-brand-orange transition-all duration-200"
                      required
                    />

                    <!-- Eye Icon (Decorative) -->
                    <div
                      class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text-muted-light dark:text-text-muted-dark hover:text-brand-blue cursor-pointer transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                        />
                      </svg>
                    </div>
                  </div>
                </div>

                <!-- Options Row -->
                <div class="flex items-center justify-between pt-1">
                  <label
                    class="flex items-center space-x-2 cursor-pointer group"
                  >
                    <input
                      type="checkbox"
                      class="w-4 h-4 rounded border-border-light dark:border-border-dark text-brand-orange bg-input-bg-light dark:bg-input-bg-dark focus:ring-brand-orange/50 focus:ring-offset-0 dark:focus:ring-offset-0 cursor-pointer"
                    />
                    <span
                      class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark group-hover:text-text-main-light dark:group-hover:text-text-main-dark transition-colors"
                      >Remember me</span
                    >
                  </label>
                  <button
                    type="button"
                    onclick="showView('view-forgot')"
                    class="text-sm font-semibold text-brand-blue dark:text-[#3B9AE5] hover:text-brand-orange dark:hover:text-brand-orange transition-colors"
                  >
                    Forgot password?
                  </button>
                </div>

                <!-- Submit Button (Gradient & Shadow) -->
                <button
                  type="submit"
                  class="w-full bg-gradient-to-r from-brand-blue to-blue-500 hover:from-brand-blue-hover hover:to-blue-600 text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-lg shadow-brand-blue/20 hover:shadow-glow-blue mt-4 transform hover:-translate-y-0.5"
                >
                  Sign In
                </button>
              </form>

              <div
                class="mt-8 pt-6 border-t border-border-light dark:border-border-dark text-center"
              >
                <p
                  class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark"
                >
                  Don't have an account?
                  <button
                    class="text-brand-orange hover:text-brand-orange-hover font-bold transition-colors"
                  >
                    Sign up for free
                  </button>
                </p>
              </div>
            </div>

            <!-- Right: Illustration (Updated with new palette & glow) -->
            <div
              class="hidden md:flex justify-center items-center relative hover-float"
            >
              <!-- Glow behind SVG -->
              <div
                class="absolute inset-0 bg-brand-blue rounded-full blur-[80px] opacity-10 dark:opacity-20 transform scale-75"
              ></div>

              <svg
                viewBox="0 0 240 240"
                class="w-full max-w-[300px] h-auto drop-shadow-2xl relative z-10"
              >
                <!-- Background abstract shape (Blue) -->
                <path
                  d="M50,120 C30,170 80,220 130,210 C180,200 210,140 190,90 C170,40 90,30 50,120 Z"
                  fill="#0C5EAD"
                  opacity="0.15"
                  class="dark:opacity-30"
                />

                <!-- Connection Lines (Orange) -->
                <path
                  d="M50,100 L120,130 L190,100 M120,130 L120,200"
                  stroke="#F99823"
                  stroke-width="2"
                  fill="none"
                  stroke-dasharray="6 4"
                  class="opacity-60"
                />

                <!-- Data Servers (Cylinders) - Dark Blue/Slate -->
                <g fill="#1E293B" stroke="#0C5EAD" stroke-width="2.5">
                  <!-- Server Left -->
                  <ellipse
                    cx="50"
                    cy="85"
                    rx="22"
                    ry="8"
                    fill="#0C5EAD"
                    opacity="0.8"
                  />
                  <path d="M28,85 v25 a22,8 0 0,0 44,0 v-25" />
                  <ellipse cx="50" cy="110" rx="22" ry="8" />
                  <!-- Server Right -->
                  <ellipse
                    cx="190"
                    cy="85"
                    rx="22"
                    ry="8"
                    fill="#0C5EAD"
                    opacity="0.8"
                  />
                  <path d="M168,85 v25 a22,8 0 0,0 44,0 v-25" />
                  <ellipse cx="190" cy="110" rx="22" ry="8" />
                  <!-- Server Top -->
                  <ellipse
                    cx="120"
                    cy="40"
                    rx="22"
                    ry="8"
                    fill="#0C5EAD"
                    opacity="0.8"
                  />
                  <path d="M98,40 v25 a22,8 0 0,0 44,0 v-25" />
                  <ellipse cx="120" cy="65" rx="22" ry="8" />
                </g>

                <!-- Shield Layer (Blue Outline, Orange Accent) -->
                <path
                  d="M120,90 L160,105 L160,140 C160,175 120,195 120,195 C120,195 80,175 80,140 L80,105 Z"
                  fill="#1E293B"
                  stroke="#0C5EAD"
                  stroke-width="3"
                  stroke-linejoin="round"
                />
                <!-- Inner Shield Glow -->
                <path
                  d="M120,98 L152,110 L152,138 C152,165 120,182 120,182 C120,182 88,165 88,138 L88,110 Z"
                  fill="#0C5EAD"
                  opacity="0.2"
                />

                <!-- Checkmark inside Shield (Orange) -->
                <path
                  d="M100,145 L115,160 L140,125"
                  stroke="#F99823"
                  stroke-width="6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />

                <!-- Floating decorative particles (Orange) -->
                <circle cx="170" cy="50" r="4" fill="#F99823" />
                <circle cx="40" cy="160" r="3" fill="#F99823" />
                <circle cx="190" cy="170" r="5" fill="#F99823" opacity="0.6" />
              </svg>
            </div>
          </div>
        </div>

        <!-- ============================================== -->
        <!-- VIEW 2: FORGOT PASSWORD (Stand-alone Layout)   -->
        <!-- ============================================== -->
        <div id="view-forgot" class="fade-enter hidden">
          <div class="max-w-sm mx-auto">
            <div class="text-center mb-8">
              <div
                class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-brand-blue/10 text-brand-blue mb-4"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
                  />
                </svg>
              </div>
              <h1 class="text-3xl font-bold mb-2 tracking-tight">
                Forgot Password?
              </h1>
              <p
                class="text-sm text-text-muted-light dark:text-text-muted-dark"
              >
                No worries, we'll send you reset instructions.
              </p>
            </div>

            <form
              class="space-y-5"
              onsubmit="
                event.preventDefault();
                showView('view-otp');
              "
            >
              <!-- Email Input -->
              <div class="space-y-2">
                <label class="block text-sm font-semibold tracking-wide"
                  >Email</label
                >
                <input
                  type="email"
                  placeholder="name@company.com"
                  class="w-full bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:border-brand-blue transition-all"
                  required
                />
              </div>

              <!-- Premium Captcha Area -->
              <div class="pt-2">
                <label class="block text-sm font-semibold tracking-wide mb-2"
                  >Security Check</label
                >
                <div
                  class="bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl p-4 flex items-center justify-between group cursor-pointer hover:border-brand-orange transition-colors"
                >
                  <div class="flex items-center gap-3">
                    <div
                      class="w-6 h-6 rounded border-2 border-border-light dark:border-border-dark group-hover:border-brand-orange flex items-center justify-center transition-colors"
                    >
                      <!-- Fake checkbox tick -->
                      <svg
                        class="w-4 h-4 text-brand-orange opacity-0 group-hover:opacity-100 transition-opacity"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        stroke-width="3"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M5 13l4 4L19 7"
                        ></path>
                      </svg>
                    </div>
                    <span class="text-sm font-medium">I am human</span>
                  </div>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6 text-brand-blue"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                    />
                  </svg>
                </div>
              </div>

              <button
                type="submit"
                class="w-full bg-brand-blue hover:bg-brand-blue-hover text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-lg shadow-brand-blue/20 hover:shadow-glow-blue mt-4"
              >
                Send Reset Link
              </button>
            </form>

            <!-- Back button -->
            <button
              onclick="showView('view-signin')"
              class="mt-6 w-full text-center text-sm font-semibold text-text-muted-light dark:text-text-muted-dark hover:text-text-main-light dark:hover:text-text-main-dark transition-colors flex items-center justify-center gap-2 group"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 group-hover:-translate-x-1 transition-transform"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M10 19l-7-7m0 0l7-7m-7 7h18"
                />
              </svg>
              Back to sign in
            </button>
          </div>
        </div>

        <!-- ============================================== -->
        <!-- VIEW 3: VERIFIKASI OTP                         -->
        <!-- ============================================== -->
        <div id="view-otp" class="fade-enter hidden">
          <div class="max-w-sm mx-auto text-center py-4">
            <div
              class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-brand-orange/10 text-brand-orange mb-4"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                />
              </svg>
            </div>
            <h1 class="text-3xl font-bold mb-2 tracking-tight">
              Check your email
            </h1>
            <p
              class="text-sm text-text-muted-light dark:text-text-muted-dark mb-8"
            >
              We sent a verification code to
              <span
                class="font-semibold text-text-main-light dark:text-text-main-dark"
                >name@company.com</span
              >
            </p>

            <form
              class="space-y-8"
              onsubmit="
                event.preventDefault();
                showView('view-signin');
                alert('Verification Complete!');
              "
            >
              <!-- 4 Input Boxes - Styled to pop -->
              <div class="flex justify-center gap-4">
                <input
                  type="number"
                  class="w-14 h-16 md:w-16 md:h-18 text-center text-3xl font-bold bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/30 transition-all shadow-sm"
                  required
                  maxlength="1"
                />
                <input
                  type="number"
                  class="w-14 h-16 md:w-16 md:h-18 text-center text-3xl font-bold bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/30 transition-all shadow-sm"
                  required
                  maxlength="1"
                />
                <input
                  type="number"
                  class="w-14 h-16 md:w-16 md:h-18 text-center text-3xl font-bold bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/30 transition-all shadow-sm"
                  required
                  maxlength="1"
                />
                <input
                  type="number"
                  class="w-14 h-16 md:w-16 md:h-18 text-center text-3xl font-bold bg-input-bg-light dark:bg-input-bg-dark border border-border-light dark:border-border-dark rounded-xl focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/30 transition-all shadow-sm"
                  required
                  maxlength="1"
                />
              </div>

              <div class="space-y-4">
                <button
                  type="submit"
                  class="w-full bg-brand-orange hover:bg-brand-orange-hover text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-lg shadow-brand-orange/20 hover:shadow-glow-orange transform hover:-translate-y-0.5"
                >
                  Verify Code
                </button>
                <p
                  class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark"
                >
                  Didn't receive the email?
                  <button
                    type="button"
                    class="text-brand-blue dark:text-[#3B9AE5] hover:text-brand-blue-hover font-semibold transition-colors"
                  >
                    Click to resend
                  </button>
                </p>
              </div>
            </form>

            <!-- Back button -->
            <button
              onclick="showView('view-forgot')"
              class="absolute top-6 left-6 md:top-8 md:left-8 text-sm font-semibold text-text-muted-light dark:text-text-muted-dark hover:text-text-main-light dark:hover:text-text-main-dark transition-colors flex items-center gap-2 group"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 group-hover:-translate-x-1 transition-transform"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M10 19l-7-7m0 0l7-7m-7 7h18"
                />
              </svg>
              Back
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // DOM Elements
      const mainContainer = document.getElementById("main-container");
      const views = document.querySelectorAll(".fade-enter");

      // Logic buat Swapping Views & merubah max-width container biar pas
      function showView(viewId) {
        views.forEach((view) => {
          view.classList.remove("block");
          view.classList.add("hidden");
        });

        if (viewId === "view-signin") {
          mainContainer.className =
            "w-full max-w-4xl transition-all duration-500 ease-in-out relative";
        } else {
          mainContainer.className =
            "w-full max-w-lg transition-all duration-500 ease-in-out relative";
        }

        // Tampilkan target view
        setTimeout(() => {
          const target = document.getElementById(viewId);
          target.classList.remove("hidden");
          target.classList.add("block");
        }, 100);
      }

      // Logic Theme Switcher
      function toggleTheme() {
        const html = document.documentElement;
        if (html.classList.contains("dark")) {
          html.classList.remove("dark");
          html.classList.add("light");
        } else {
          html.classList.remove("light");
          html.classList.add("dark");
        }
      }

      // Logic OTP Auto-advance Focus
      const otpInputs = document.querySelectorAll('input[type="number"]');
      otpInputs.forEach((input, index) => {
        input.addEventListener("input", function (e) {
          if (this.value.length > 1) {
            this.value = this.value.slice(0, 1);
          }
          if (this.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", function (e) {
          if (e.key === "Backspace" && this.value === "" && index > 0) {
            otpInputs[index - 1].focus();
          }
        });
      });
    </script>
  </body>
</html>
